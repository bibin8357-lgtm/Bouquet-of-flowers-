<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouquet for My Love 💐</title>
    <style>
        :root {
            --soft-pink: #fff0f3;
            --deep-rose: #c9184a;
            --canvas-bg: #ffffff;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fceef5 0%, #e8d7ff 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 { font-size: 2.5rem; color: var(--deep-rose); margin: 0; font-weight: 300; }
        .header p { font-style: italic; color: #7a7a7a; }

        .workspace {
            display: flex;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            gap: 40px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Canvas Style */
        .canvas-container {
            position: relative;
            background: var(--canvas-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 8px solid white;
        }

        #bouquetCanvas {
            cursor: move;
            border-radius: 12px;
        }

        /* Controls Style */
        .controls {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tool-group {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .tool-group h3 {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b5838d;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .asset-item {
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 5px;
            cursor: pointer;
            transition: 0.3s;
            background: #fdfdfd;
        }

        .asset-item:hover {
            border-color: var(--deep-rose);
            transform: scale(1.1);
        }

        .asset-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-bar {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-save { background: var(--deep-rose); color: white; }
        .btn-clear { background: #eee; color: #666; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .tip { font-size: 0.75rem; color: #aaa; text-align: center; }

    </style>
</head>
<body>

<div class="header">
    <h1>Create Your Eternal Bouquet</h1>
    <p>Hand-pick each flower to create a digital masterpiece</p>
</div>

<div class="workspace">
    <div class="canvas-container">
        <canvas id="bouquetCanvas" width="500" height="600"></canvas>
    </div>

    <div class="controls">
        <div class="tool-group">
            <h3>🌸 Digital Flowers</h3>
            <div class="item-grid">
                <div class="asset-item" onclick="addItem('https://i.ibb.co/LkvmNdb/red-rose.png', 180)">
                    <img src="https://i.ibb.co/LkvmNdb/red-rose.png" alt="Rose">
                </div>
                <div class="asset-item" onclick="addItem('https://i.ibb.co/9Vsy97m/white-lily.png', 200)">
                    <img src="https://i.ibb.co/9Vsy97m/white-lily.png" alt="Lily">
                </div>
                <div class="asset-item" onclick="addItem('https://i.ibb.co/m0f6vX5/daisy.png', 150)">
                    <img src="https://i.ibb.co/m0f6vX5/daisy.png" alt="Daisy">
                </div>
            </div>
        </div>

        <div class="tool-group">
            <h3>🌿 Greenery & Buds</h3>
            <div class="item-grid">
                <div class="asset-item" onclick="addItem('https://i.ibb.co/vY8mXF7/eucalyptus.png', 220)">
                    <img src="https://i.ibb.co/vY8mXF7/eucalyptus.png" alt="Leaf">
                </div>
                <div class="asset-item" onclick="addItem('https://i.ibb.co/p33XFfK/bud.png', 120)">
                    <img src="https://i.ibb.co/p33XFfK/bud.png" alt="Bud">
                </div>
            </div>
        </div>

        <div class="tool-group">
            <h3>🎀 Finishing Touches</h3>
            <div class="item-grid">
                <div class="asset-item" onclick="addItem('https://i.ibb.co/0V0fK88/wrapper.png', 450)">
                    <img src="https://i.ibb.co/0V0fK88/wrapper.png" alt="Wrap">
                </div>
                <div class="asset-item" onclick="addItem('https://i.ibb.co/5YmX6fH/ribbon.png', 180)">
                    <img src="https://i.ibb.co/5YmX6fH/ribbon.png" alt="Ribbon">
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-clear" onclick="clearAll()">Reset</button>
            <button class="btn btn-save" onclick="download()">Download Image</button>
        </div>
        <p class="tip">Tip: Elements are layered in the order you click them!</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('bouquetCanvas');
    const ctx = canvas.getContext('2d');
    let items = [];
    let selectedItem = null;

    function addItem(url, size) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        img.onload = () => {
            const newItem = {
                img,
                x: (canvas.width - size) / 2,
                y: (canvas.height - size) / 2,
                size,
                isDragging: false
            };
            items.push(newItem);
            render();
        };
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Draw wrapper first if it exists to keep it in back, or just use natural order
        items.forEach(item => {
            ctx.drawImage(item.img, item.x, item.y, item.size, item.size);
        });
    }

    // Interaction Logic
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            if (mouseX > item.x && mouseX < item.x + item.size &&
                mouseY > item.y && mouseY < item.y + item.size) {
                selectedItem = item;
                item.isDragging = true;
                // Move to front when clicked
                items.push(items.splice(i, 1)[0]);
                break;
            }
        }
    };

    window.onmousemove = (e) => {
        if (selectedItem && selectedItem.isDragging) {
            const rect = canvas.getBoundingClientRect();
            selectedItem.x = e.clientX - rect.left - selectedItem.size / 2;
            selectedItem.y = e.clientY - rect.top - selectedItem.size / 2;
            render();
        }
    };

    window.onmouseup = () => {
        if (selectedItem) selectedItem.isDragging = false;
        selectedItem = null;
    };

    function clearAll() { items = []; render(); }

    function download() {
        const link = document.createElement('a');
        link.download = 'My_Digital_Bouquet.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
